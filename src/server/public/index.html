<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer" />
    <title>Summarize</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ── Tokens ──────────────────────────────────────────── */
      :root {
        color-scheme: light dark;
        --font-display: "Instrument Serif", Georgia, serif;
        --font-body: "Space Grotesk", system-ui, sans-serif;
        --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          monospace;
        --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      }

      @media (prefers-color-scheme: light) {
        :root {
          --bg: #f0ebe3;
          --surface: #f8f5f0;
          --panel: #fdfbf7;
          --text: #1a1613;
          --muted: #6b6155;
          --accent: #c93a1e;
          --accent-hover: #a52f18;
          --accent-text: #fdfbf7;
          --border: rgba(26, 22, 19, 0.1);
          --border-strong: rgba(26, 22, 19, 0.18);
          --field-bg: rgba(255, 253, 248, 0.9);
          --shadow-sm: 0 1px 3px rgba(26, 22, 19, 0.06);
          --shadow-md: 0 8px 24px rgba(26, 22, 19, 0.08);
          --code-bg: rgba(26, 22, 19, 0.05);
          --warning-bg: #fef8f0;
          --warning-border: rgba(180, 120, 40, 0.25);
          --warning-text: #8c5a1e;
          --error-bg: #fdf2f0;
          --error-border: rgba(201, 58, 30, 0.25);
          --error-text: #991b1b;
          --danger-bg: #fdf2f0;
          --danger-border: rgba(201, 58, 30, 0.25);
          --danger-text: #991b1b;
          --danger-hover: #fce8e6;
          --badge-article: #2563eb;
          --badge-podcast: #15803d;
        }
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #131110;
          --surface: #1b1816;
          --panel: #221f1c;
          --text: #e4dcd0;
          --muted: #9a8f82;
          --accent: #e25b3a;
          --accent-hover: #f06a4a;
          --accent-text: #131110;
          --border: rgba(228, 220, 208, 0.1);
          --border-strong: rgba(228, 220, 208, 0.18);
          --field-bg: rgba(19, 17, 16, 0.7);
          --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.15);
          --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.25);
          --code-bg: rgba(228, 220, 208, 0.06);
          --warning-bg: rgba(180, 120, 40, 0.1);
          --warning-border: rgba(180, 120, 40, 0.2);
          --warning-text: #d4a04a;
          --error-bg: rgba(226, 91, 58, 0.1);
          --error-border: rgba(226, 91, 58, 0.2);
          --error-text: #f0a090;
          --danger-bg: rgba(226, 91, 58, 0.1);
          --danger-border: rgba(226, 91, 58, 0.2);
          --danger-text: #f0a090;
          --danger-hover: rgba(226, 91, 58, 0.15);
          --badge-article: #60a5fa;
          --badge-podcast: #4ade80;
        }
      }

      /* ── Reset ───────────────────────────────────────────── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      ::selection {
        background: color-mix(in srgb, var(--accent) 25%, transparent);
        color: var(--text);
      }

      /* ── Skip link ──────────────────────────────────────────── */
      .skip-link {
        position: absolute;
        top: -100%;
        left: 16px;
        padding: 8px 16px;
        background: var(--accent);
        color: var(--accent-text);
        border-radius: 0 0 8px 8px;
        font-size: 13px;
        font-weight: 700;
        text-decoration: none;
        z-index: 3;
        transition: top 150ms ease;
      }

      .skip-link:focus {
        top: 0;
      }

      /* ── Page ─────────────────────────────────────────────── */
      body {
        font-family: var(--font-body);
        font-size: 15px;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
        min-height: 100vh;
        padding: 0 16px 64px;
        -webkit-font-smoothing: antialiased;
      }

      /* Accent bar */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: var(--accent);
        z-index: 2;
      }

      /* Grain texture */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 200px;
        opacity: 0.025;
        z-index: 1;
      }

      .container {
        max-width: 720px;
        margin: 0 auto;
        padding-top: clamp(48px, 8vh, 96px);
      }

      /* ── Brand ────────────────────────────────────────────── */
      .brand {
        margin-bottom: 40px;
        animation: fadeIn 600ms var(--ease-out-expo) both;
      }

      .brand-title {
        font-family: var(--font-display);
        font-style: italic;
        font-weight: 400;
        font-size: clamp(2.75rem, 5vw + 1rem, 4.25rem);
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      .brand-tagline {
        margin-top: 8px;
        font-size: 15px;
        color: var(--muted);
        font-weight: 400;
      }

      #account-greeting {
        font-size: 0.9rem;
        opacity: 0.7;
      }

      /* ── Auth warning ─────────────────────────────────────── */
      .auth-warning {
        background: var(--warning-bg);
        border: 1px solid var(--warning-border);
        border-radius: 10px;
        padding: 10px 14px;
        margin-bottom: 20px;
        font-size: 13px;
        color: var(--warning-text);
        line-height: 1.45;
      }

      .auth-warning code {
        font-family: var(--font-mono);
        background: var(--code-bg);
        padding: 0.1em 0.35em;
        border-radius: 4px;
        font-size: 0.88em;
      }

      /* ── Form panel ───────────────────────────────────────── */
      .form-panel {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--panel);
        padding: 16px;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 12px;
        box-shadow: var(--shadow-sm);
        animation: fadeInUp 600ms var(--ease-out-expo) 80ms both;
      }

      /* ── Tabs ─────────────────────────────────────────────── */
      .tabs {
        display: flex;
        gap: 2px;
      }

      .tab {
        border-radius: 8px;
        padding: 6px 16px;
        font-size: 13px;
        font-weight: 500;
        font-family: var(--font-body);
        border: 1px solid transparent;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition:
          color 180ms ease,
          background 180ms ease,
          border-color 180ms ease;
        letter-spacing: 0.01em;
      }

      .tab:hover {
        color: var(--text);
        background: color-mix(in srgb, var(--text) 5%, transparent);
      }

      .tab:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: -1px;
      }

      .tab.active {
        color: var(--text);
        background: var(--surface);
        border-color: var(--border);
        font-weight: 700;
      }

      /* ── Tab panels ───────────────────────────────────────── */
      .tab-content {
        display: none;
        min-width: 0;
      }

      .tab-content.active {
        display: block;
      }

      /* ── Inputs / select ──────────────────────────────────── */
      input[type="text"],
      textarea,
      select {
        width: 100%;
        padding: 10px 14px;
        font-size: 15px;
        font-family: var(--font-body);
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--field-bg);
        color: var(--text);
        outline: none;
        transition:
          border-color 180ms ease,
          box-shadow 180ms ease;
      }

      input[type="text"]::placeholder,
      textarea::placeholder {
        color: var(--muted);
        opacity: 0.7;
      }

      input[type="text"]:focus,
      textarea:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
      }

      textarea {
        min-height: 120px;
        resize: vertical;
        line-height: 1.55;
      }

      select {
        appearance: none;
        padding-right: 36px;
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236B6155' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-position: right 12px center;
        background-repeat: no-repeat;
        cursor: pointer;
        font-size: 14px;
      }

      @media (prefers-color-scheme: dark) {
        select {
          background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%239A8F82' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        }
      }

      /* ── Form actions ─────────────────────────────────────── */
      .form-actions {
        display: flex;
        gap: 10px;
        align-items: stretch;
      }

      .form-actions select {
        width: auto;
        min-width: 110px;
        flex-shrink: 0;
      }

      /* ── Submit button ────────────────────────────────────── */
      button[type="submit"] {
        flex: 1;
        padding: 10px 24px;
        font-size: 15px;
        font-weight: 700;
        font-family: var(--font-body);
        color: var(--accent-text);
        background: var(--accent);
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition:
          background 180ms ease,
          transform 120ms ease;
        letter-spacing: 0.01em;
      }

      button[type="submit"]:hover:not(:disabled) {
        background: var(--accent-hover);
      }

      button[type="submit"]:active:not(:disabled) {
        transform: scale(0.985);
      }

      button[type="submit"]:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      button[type="submit"]:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ── Loading ──────────────────────────────────────────── */
      .loading {
        display: none;
        flex-direction: column;
        gap: 12px;
        margin-top: 24px;
      }

      .loading.visible {
        display: flex;
      }

      .loading-bar {
        width: 100%;
        height: 2px;
        background: var(--border);
        border-radius: 1px;
        overflow: hidden;
      }

      .loading-bar::after {
        content: "";
        display: block;
        width: 30%;
        height: 100%;
        background: var(--accent);
        border-radius: 1px;
        animation: loading-slide 1.6s var(--ease-out-quart) infinite;
      }

      @keyframes loading-slide {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(433%);
        }
      }

      .loading-text {
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.01em;
      }

      @media (prefers-reduced-motion: reduce) {
        .loading-bar::after {
          animation: none;
          width: 100%;
          opacity: 0.5;
        }
      }

      /* ── Error ────────────────────────────────────────────── */
      .error {
        display: none;
        margin-top: 24px;
        padding: 12px 14px;
        background: var(--error-bg);
        border: 1px solid var(--error-border);
        border-radius: 10px;
        color: var(--error-text);
        font-size: 14px;
        line-height: 1.45;
      }

      .error.visible {
        display: block;
        animation: fadeIn 300ms var(--ease-out-expo);
      }

      /* ── Result ───────────────────────────────────────────── */
      .result {
        display: none;
        margin-top: 32px;
      }

      .result.visible {
        display: block;
        animation: fadeInUp 500ms var(--ease-out-expo);
      }

      .result-header {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 8px;
      }

      .copy-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 5px 10px;
        font-family: var(--font-body);
        font-size: 12px;
        font-weight: 500;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        cursor: pointer;
        transition:
          color 150ms ease,
          border-color 150ms ease,
          background 150ms ease;
      }

      .copy-btn:hover {
        color: var(--text);
        border-color: var(--border-strong);
        background: var(--surface);
      }

      .copy-btn:active {
        transform: scale(0.97);
      }

      .copy-btn.copied {
        color: var(--accent);
        border-color: color-mix(in srgb, var(--accent) 30%, transparent);
      }

      .result-body {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px 24px;
        box-shadow: var(--shadow-md);
      }

      .result-meta {
        margin-top: 12px;
        padding: 0 4px;
        font-size: 12px;
        font-family: var(--font-mono);
        color: var(--muted);
        display: flex;
        flex-wrap: wrap;
        gap: 4px 14px;
        opacity: 0.75;
      }

      /* ── Markdown rendering ───────────────────────────────── */
      .result-body h1,
      .result-body h2,
      .result-body h3,
      .result-body h4 {
        font-family: var(--font-display);
        font-weight: 400;
        font-style: italic;
        line-height: 1.25;
        color: var(--text);
      }

      .result-body h1 {
        font-size: 1.6rem;
        margin: 1.5em 0 0.5em;
      }
      .result-body h2 {
        font-size: 1.35rem;
        margin: 1.3em 0 0.45em;
      }
      .result-body h3 {
        font-size: 1.15rem;
        margin: 1.2em 0 0.4em;
      }
      .result-body h4 {
        font-size: 1rem;
        margin: 1em 0 0.35em;
      }

      .result-body h1:first-child,
      .result-body h2:first-child,
      .result-body h3:first-child {
        margin-top: 0;
      }

      .result-body p {
        margin-bottom: 0.85em;
        line-height: 1.7;
      }

      .result-body p:last-child {
        margin-bottom: 0;
      }

      .result-body ul,
      .result-body ol {
        margin-bottom: 0.85em;
        padding-left: 1.4em;
      }

      .result-body li {
        margin-bottom: 0.3em;
        line-height: 1.65;
      }

      .result-body li::marker {
        color: var(--muted);
      }

      .result-body code {
        font-family: var(--font-mono);
        background: var(--code-bg);
        padding: 0.12em 0.35em;
        border-radius: 4px;
        font-size: 0.88em;
      }

      .result-body pre {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 16px;
        border-radius: 10px;
        overflow-x: auto;
        margin-bottom: 0.85em;
      }

      .result-body pre code {
        background: none;
        padding: 0;
        font-size: 0.85em;
      }

      .result-body blockquote {
        border-left: 3px solid var(--accent);
        padding-left: 16px;
        margin-bottom: 0.85em;
        color: var(--muted);
        font-style: italic;
      }

      .result-body table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 0.85em;
        font-size: 14px;
      }

      .result-body th,
      .result-body td {
        text-align: left;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
      }

      .result-body th {
        font-weight: 700;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        border-bottom: 2px solid var(--border-strong);
      }

      .result-body a {
        color: var(--accent);
        text-decoration: underline;
        text-decoration-color: color-mix(
          in srgb,
          var(--accent) 35%,
          transparent
        );
        text-underline-offset: 2px;
        transition: text-decoration-color 150ms ease;
      }

      .result-body a:hover {
        text-decoration-color: var(--accent);
      }

      .result-body hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 1.5em 0;
      }

      .result-body strong {
        font-weight: 700;
      }

      /* ── History ──────────────────────────────────────────── */
      .history-item {
        padding: 12px 4px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        background: transparent;
        transition: background 180ms ease;
        overflow: hidden;
      }

      .history-item:last-child {
        border-bottom: none;
      }

      .history-item:hover {
        background: color-mix(in srgb, var(--text) 4%, transparent);
      }

      .history-item:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: -2px;
        border-radius: 6px;
      }

      .history-item-title {
        font-weight: 500;
        font-size: 15px;
        margin-bottom: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }

      .history-item-meta {
        font-size: 12px;
        color: var(--muted);
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .history-badge {
        display: inline-block;
        padding: 1px 6px;
        font-size: 10px;
        font-weight: 700;
        border-radius: 4px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .badge-article {
        background: color-mix(in srgb, var(--badge-article) 15%, var(--surface));
        color: var(--badge-article);
      }
      .badge-video {
        background: color-mix(in srgb, var(--accent) 15%, var(--surface));
        color: var(--accent);
      }
      .badge-podcast {
        background: color-mix(in srgb, var(--badge-podcast) 15%, var(--surface));
        color: var(--badge-podcast);
      }
      .badge-text {
        background: color-mix(in srgb, var(--muted) 15%, var(--surface));
        color: var(--muted);
      }

      .history-detail-back {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 13px;
        font-family: var(--font-body);
        color: var(--muted);
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px 0;
        margin-bottom: 14px;
        transition: color 150ms ease;
      }

      .history-detail-back:hover {
        color: var(--text);
      }

      .history-detail-back:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .history-transcript-toggle {
        margin-top: 14px;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 500;
        font-family: var(--font-body);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        text-align: left;
        color: var(--text);
        transition:
          border-color 180ms ease,
          background 180ms ease;
      }

      .history-transcript-toggle:hover {
        border-color: var(--border-strong);
      }

      .history-transcript-toggle:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: -1px;
      }

      .history-transcript-body {
        display: none;
        margin-top: 8px;
        padding: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 14px;
        line-height: 1.6;
        max-height: 400px;
        overflow-y: auto;
        white-space: pre-wrap;
        color: var(--text);
      }

      .history-delete-btn {
        margin-top: 14px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 500;
        font-family: var(--font-body);
        color: var(--danger-text);
        background: var(--danger-bg);
        border: 1px solid var(--danger-border);
        border-radius: 8px;
        cursor: pointer;
        transition: background 180ms ease;
      }

      .history-delete-btn:hover {
        background: var(--danger-hover);
      }

      .history-delete-btn:focus-visible {
        outline: 2px solid var(--danger-text);
        outline-offset: -1px;
      }

      .history-load-more {
        margin-top: 12px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 500;
        font-family: var(--font-body);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        color: var(--text);
        transition: border-color 180ms ease;
      }

      .history-load-more:hover {
        border-color: var(--border-strong);
      }

      .history-load-more:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: -1px;
      }

      .history-empty {
        color: var(--muted);
        text-align: center;
        padding: 32px 0;
        font-size: 14px;
      }

      .history-media {
        width: 100%;
        margin-top: 14px;
      }

      video.history-media {
        border-radius: 10px;
      }

      /* ── Colophon ─────────────────────────────────────────── */
      .colophon {
        margin-top: 48px;
        font-size: 12px;
        color: var(--muted);
      }

      .colophon a {
        color: var(--muted);
        text-decoration: none;
        transition: color 150ms ease;
      }

      .colophon a:hover {
        color: var(--text);
      }

      /* ── Animations ───────────────────────────────────────── */
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(16px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .brand,
        .form-panel,
        .result.visible,
        .error.visible {
          animation: none !important;
        }
      }

      /* ── Responsive ───────────────────────────────────────── */
      @media (max-width: 500px) {
        body {
          padding: 0 12px 40px;
        }

        .container {
          padding-top: 32px;
        }

        .brand {
          margin-bottom: 28px;
        }

        .form-panel {
          padding: 12px;
        }

        .form-actions {
          flex-direction: column;
        }

        .form-actions select {
          width: 100%;
        }

        .result-body {
          padding: 18px 16px;
        }
      }

      /* ── Touch devices ─────────────────────────────────────── */
      @media (pointer: coarse) {
        .tab {
          padding: 12px 16px;
        }

        .copy-btn {
          padding: 10px 14px;
        }

        .history-detail-back {
          padding: 12px 4px;
        }

        .history-transcript-toggle,
        .history-delete-btn,
        .history-load-more {
          padding: 12px 14px;
        }
      }
    </style>
  </head>
  <body>
    <a href="#form" class="skip-link">Skip to content</a>
    <div class="container">
      <header class="brand">
        <h1 class="brand-title">Summarize</h1>
        <p class="brand-tagline">Distill any URL or text into its essence.</p>
        <span id="account-greeting" style="display: none;"></span>
      </header>

      <div id="auth-warning" class="auth-warning" style="display: none">
        No API token detected. Append <code>?token=YOUR_TOKEN</code> to the URL
        to authenticate.
      </div>

      <form id="form" class="form-panel">
        <div class="tabs" role="tablist" aria-label="Input mode">
          <button
            type="button"
            class="tab active"
            role="tab"
            id="tab-btn-url"
            data-tab="url"
            aria-selected="true"
            aria-controls="tab-url"
          >
            URL
          </button>
          <button
            type="button"
            class="tab"
            role="tab"
            id="tab-btn-text"
            data-tab="text"
            aria-selected="false"
            aria-controls="tab-text"
          >
            Text
          </button>
          <button
            type="button"
            class="tab"
            role="tab"
            id="tab-btn-history"
            data-tab="history"
            aria-selected="false"
            aria-controls="tab-history"
          >
            History
          </button>
        </div>

        <div id="tab-url" class="tab-content active" role="tabpanel" aria-labelledby="tab-btn-url">
          <input
            type="text"
            id="url-input"
            aria-label="URL to summarize"
            placeholder="Paste an article, podcast, or video URL"
            autocomplete="off"
          />
        </div>

        <div id="tab-text" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-text">
          <textarea
            id="text-input"
            aria-label="Text to summarize"
            placeholder="Paste content to summarize..."
          ></textarea>
        </div>

        <div id="tab-history" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-history">
          <div id="history-list"></div>
          <div id="history-detail" style="display: none"></div>
          <button
            type="button"
            id="history-load-more"
            class="history-load-more"
            style="display: none"
          >
            Load more
          </button>
          <div id="history-empty" class="history-empty" style="display: none">
            No summaries yet. Paste a URL or text in the tabs above to
            create your first one — it will appear here.
          </div>
        </div>

        <div class="form-actions">
          <select id="length-select" aria-label="Summary length">
            <option value="tiny">Tiny</option>
            <option value="short">Short</option>
            <option value="medium" selected>Medium</option>
            <option value="long">Long</option>
            <option value="xlarge">XLarge</option>
          </select>
          <button type="submit" id="submit-btn">Summarize</button>
        </div>
      </form>

      <div id="loading" class="loading" aria-live="polite">
        <div class="loading-bar" aria-hidden="true"></div>
        <span id="loading-text" class="loading-text">Summarizing&hellip;</span>
      </div>

      <div id="error" class="error" role="alert"></div>

      <div id="result" class="result">
        <div class="result-header">
          <button
            type="button"
            id="copy-btn"
            class="copy-btn"
            title="Copy summary to clipboard"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 16 16"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <rect x="5" y="5" width="9" height="9" rx="1.5" />
              <path
                d="M11 5V3.5A1.5 1.5 0 009.5 2h-6A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5"
              />
            </svg>
            <span id="copy-label">Copy</span>
          </button>
        </div>
        <div id="result-body" class="result-body"></div>
        <div id="result-meta" class="result-meta"></div>
      </div>

      <footer class="colophon">
        <a
          href="https://summarize.sh"
          target="_blank"
          rel="noopener noreferrer"
          >Summarize</a
        >
        &mdash;
        <a href="https://steipete.me" target="_blank" rel="noopener noreferrer"
          >Peter Steinberger</a
        >
      </footer>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.2.5/dist/purify.min.js"></script>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var token = params.get("token") || "";

        // Fetch account name and display greeting
        if (token) {
          fetch('/v1/me', {
            headers: { 'Authorization': 'Bearer ' + token }
          })
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
              if (data && data.account && data.account.name) {
                var greeting = document.getElementById('account-greeting');
                if (greeting) {
                  greeting.textContent = 'Hi, ' + data.account.name;
                  greeting.style.display = '';
                }
              }
            })
            .catch(function() { /* degrade gracefully */ });
        }

        var authWarning = document.getElementById("auth-warning");
        var form = document.getElementById("form");
        var urlInput = document.getElementById("url-input");
        var textInput = document.getElementById("text-input");
        var lengthSelect = document.getElementById("length-select");
        var submitBtn = document.getElementById("submit-btn");
        var loadingEl = document.getElementById("loading");
        var loadingText = document.getElementById("loading-text");
        var errorEl = document.getElementById("error");
        var resultEl = document.getElementById("result");
        var resultBody = document.getElementById("result-body");
        var resultMeta = document.getElementById("result-meta");
        var copyBtn = document.getElementById("copy-btn");
        var copyLabel = document.getElementById("copy-label");

        var activeTab = "url";
        var timer = null;
        var lastSummaryRaw = "";

        // Auth warning
        if (!token) {
          authWarning.style.display = "block";
        }

        // Tab switching
        document.querySelectorAll(".tab").forEach(function (tab) {
          tab.addEventListener("click", function () {
            var target = this.getAttribute("data-tab");
            if (target === activeTab) return;

            activeTab = target;

            document.querySelectorAll(".tab").forEach(function (t) {
              var isActive = t.getAttribute("data-tab") === target;
              t.classList.toggle("active", isActive);
              t.setAttribute("aria-selected", isActive ? "true" : "false");
            });

            document.querySelectorAll(".tab-content").forEach(function (c) {
              c.classList.toggle("active", c.id === "tab-" + target);
            });

            // Hide form controls and result area on history tab
            var formActions = document.querySelector(".form-actions");
            if (formActions)
              formActions.style.display =
                target === "history" ? "none" : "flex";

            // Hide/restore result area to avoid duplicate content with history detail
            if (target === "history") {
              resultEl.classList.remove("visible");
              errorEl.classList.remove("visible");
              loadingEl.classList.remove("visible");
            } else if (lastSummaryRaw) {
              resultEl.style.animation = "none";
              resultEl.classList.add("visible");
              requestAnimationFrame(function () {
                resultEl.style.animation = "";
              });
            }
          });
        });

        // Keyboard shortcut: Cmd/Ctrl+Enter to submit
        document.addEventListener("keydown", function (e) {
          if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
            e.preventDefault();
            if (activeTab !== "history" && !submitBtn.disabled) {
              form.requestSubmit();
            }
          }
        });

        // Copy button
        copyBtn.addEventListener("click", function () {
          if (!lastSummaryRaw) return;
          navigator.clipboard.writeText(lastSummaryRaw).then(function () {
            copyBtn.classList.add("copied");
            copyLabel.textContent = "Copied";
            setTimeout(function () {
              copyBtn.classList.remove("copied");
              copyLabel.textContent = "Copy";
            }, 2000);
          });
        });

        // Form submit
        form.addEventListener("submit", async function (e) {
          e.preventDefault();

          if (typeof marked === "undefined") {
            errorEl.textContent =
              "Failed to load markdown renderer. Check your internet connection.";
            errorEl.classList.add("visible");
            return;
          }

          // Build payload
          var length = lengthSelect.value;
          var payload = { length: length };

          if (activeTab === "url") {
            var url = urlInput.value.trim();
            if (!url) return;
            payload.url = url;
          } else {
            var text = textInput.value.trim();
            if (!text) return;
            payload.text = text;
          }

          // Reset UI
          errorEl.classList.remove("visible");
          errorEl.textContent = "";
          resultEl.classList.remove("visible");
          resultBody.innerHTML = "";
          resultMeta.innerHTML = "";
          lastSummaryRaw = "";

          // Show loading
          var elapsed = 0;
          loadingText.textContent = "Summarizing\u2026 (0s)";
          loadingEl.classList.add("visible");
          timer = setInterval(function () {
            elapsed++;
            loadingText.textContent = "Summarizing\u2026 (" + elapsed + "s)";
          }, 1000);

          // Disable button
          submitBtn.disabled = true;

          try {
            var res = await fetch("/v1/summarize", {
              method: "POST",
              headers: {
                Authorization: "Bearer " + token,
                "Content-Type": "application/json",
              },
              body: JSON.stringify(payload),
            });

            if (res.ok) {
              var data = await res.json();
              lastSummaryRaw = data.summary || "";
              resultBody.innerHTML = DOMPurify.sanitize(
                marked.parse(lastSummaryRaw),
              );
              // Build metadata from insights
              var parts = [];
              var ins = data.insights;

              // Title
              if (ins && ins.title) {
                parts.push(ins.title);
              } else if (data.metadata && data.metadata.title) {
                parts.push(data.metadata.title);
              }

              // Model
              if (data.metadata && data.metadata.model) {
                parts.push("Model: " + data.metadata.model);
              }

              // Cache
              if (ins && ins.summaryFromCache) {
                parts.push("Summary: cached");
              }

              // Duration
              if (data.metadata && data.metadata.durationMs != null) {
                parts.push(
                  "Duration: " +
                    (data.metadata.durationMs / 1000).toFixed(1) +
                    "s",
                );
              }

              // Cost
              if (ins && ins.costUsd != null) {
                parts.push("Cost: $" + ins.costUsd.toFixed(4));
              }

              // Extraction method
              if (ins && ins.extractionMethod) {
                var method = "Method: " + ins.extractionMethod;
                if (ins.transcriptionProvider) {
                  method += " (" + ins.transcriptionProvider + ")";
                }
                parts.push(method);
              }

              // Cache status (transcript)
              if (ins && ins.cacheStatus && ins.cacheStatus !== "unknown") {
                parts.push("Transcript: " + ins.cacheStatus);
              }

              // Media duration
              if (ins && ins.mediaDurationSeconds != null) {
                var mins = Math.round(ins.mediaDurationSeconds / 60);
                parts.push(
                  mins > 0
                    ? mins + "min media"
                    : Math.round(ins.mediaDurationSeconds) + "s media",
                );
              }

              // Word count
              if (ins && ins.wordCount != null && ins.wordCount > 0) {
                var wc =
                  ins.wordCount >= 1000
                    ? (ins.wordCount / 1000).toFixed(1) + "k"
                    : String(ins.wordCount);
                parts.push(wc + " words");
              }

              // Tokens
              if (
                ins &&
                (ins.inputTokens != null || ins.outputTokens != null)
              ) {
                var tokIn = ins.inputTokens || 0;
                var tokOut = ins.outputTokens || 0;
                parts.push(
                  "Tokens: " +
                    (tokIn + tokOut).toLocaleString() +
                    " (" +
                    tokIn.toLocaleString() +
                    " in / " +
                    tokOut.toLocaleString() +
                    " out)",
                );
              } else if (data.metadata && data.metadata.usage) {
                var u = data.metadata.usage;
                var total = (u.inputTokens || 0) + (u.outputTokens || 0);
                parts.push("Tokens: " + total.toLocaleString());
              }

              // Services
              if (ins && ins.servicesUsed && ins.servicesUsed.length > 0) {
                parts.push("Services: " + ins.servicesUsed.join(", "));
              }

              // Attempted providers (fallback chain)
              if (
                ins &&
                ins.attemptedProviders &&
                ins.attemptedProviders.length > 1
              ) {
                parts.push(
                  "Tried: " + ins.attemptedProviders.join(" \u2192 "),
                );
              }

              // Pipeline timing
              if (ins && ins.stages && ins.stages.length > 0) {
                var timing = ins.stages
                  .map(function (s) {
                    return (
                      s.stage
                        .replace(/-/g, " ")
                        .replace(/\b\w/g, function (c) {
                          return c.toUpperCase();
                        }) +
                      ": " +
                      formatDuration(s.durationMs)
                    );
                  })
                  .join(" | ");
                parts.push(timing);
              }

              resultMeta.innerHTML = parts
                .map(function (p) {
                  return "<span>" + escapeHtml(p) + "</span>";
                })
                .join("");
              if (activeTab !== "history")
                resultEl.classList.add("visible");
            } else {
              var msg;
              try {
                var errData = await res.json();
                msg =
                  (errData.error && errData.error.message) || res.statusText;
              } catch {
                msg = res.statusText || "Request failed";
              }
              errorEl.textContent = msg;
              if (activeTab !== "history")
                errorEl.classList.add("visible");
            }
          } catch {
            errorEl.textContent =
              "Network error \u2014 could not reach server.";
            if (activeTab !== "history")
              errorEl.classList.add("visible");
          } finally {
            loadingEl.classList.remove("visible");
            clearInterval(timer);
            timer = null;
            submitBtn.disabled = false;
          }
        });

        function escapeHtml(str) {
          var div = document.createElement("div");
          div.appendChild(document.createTextNode(str));
          return div.innerHTML;
        }

        function formatDuration(ms) {
          if (ms < 1000) return ms + "ms";
          return (ms / 1000).toFixed(1) + "s";
        }

        // ---- History ----
        var historyOffset = 0;
        var historyLimit = 20;
        var historyTotal = 0;

        var historyList = document.getElementById("history-list");
        var historyDetail = document.getElementById("history-detail");
        var historyLoadMore = document.getElementById("history-load-more");
        var historyEmpty = document.getElementById("history-empty");

        function badgeClass(type) {
          return "history-badge badge-" + (type || "article");
        }

        function formatDate(iso) {
          try {
            var d = new Date(iso);
            return (
              d.toLocaleDateString(undefined, {
                month: "short",
                day: "numeric",
                year: "numeric",
              }) +
              " " +
              d.toLocaleTimeString(undefined, {
                hour: "2-digit",
                minute: "2-digit",
              })
            );
          } catch {
            return iso;
          }
        }

        function truncateUrl(url, max) {
          if (!url || url.length <= max) return url;
          return url.substring(0, max) + "\u2026";
        }

        async function loadHistory(append) {
          if (!append) {
            historyOffset = 0;
            historyList.innerHTML = "";
          }
          try {
            var res = await fetch(
              "/v1/history?limit=" + historyLimit + "&offset=" + historyOffset,
              {
                headers: { Authorization: "Bearer " + token },
              },
            );
            if (!res.ok) return;
            var data = await res.json();
            historyTotal = data.total;

            if (data.entries.length === 0 && historyOffset === 0) {
              historyEmpty.style.display = "block";
              historyLoadMore.style.display = "none";
              return;
            }
            historyEmpty.style.display = "none";

            data.entries.forEach(function (entry) {
              var div = document.createElement("div");
              div.className = "history-item";
              div.setAttribute("data-id", entry.id);
              div.setAttribute("role", "button");
              div.setAttribute("tabindex", "0");
              var title =
                entry.title ||
                truncateUrl(entry.sourceUrl, 60) ||
                "Text input";
              div.setAttribute("aria-label", title);
              div.innerHTML =
                '<div class="history-item-title">' +
                escapeHtml(title) +
                "</div>" +
                '<div class="history-item-meta">' +
                '<span class="' +
                badgeClass(entry.sourceType) +
                '">' +
                escapeHtml(entry.sourceType || "article") +
                "</span>" +
                "<span>" +
                escapeHtml(formatDate(entry.createdAt)) +
                "</span>" +
                "<span>" +
                escapeHtml(entry.model) +
                "</span>" +
                "</div>";
              function activate() {
                showHistoryDetail(entry.id);
              }
              div.addEventListener("click", activate);
              div.addEventListener("keydown", function (e) {
                if (e.key === "Enter" || e.key === " ") {
                  e.preventDefault();
                  activate();
                }
              });
              historyList.appendChild(div);
            });

            historyOffset += data.entries.length;
            historyLoadMore.style.display =
              historyOffset < historyTotal ? "block" : "none";
          } catch (err) {
            console.error("Failed to load history:", err);
          }
        }

        async function showHistoryDetail(id) {
          try {
            var res = await fetch(
              "/v1/history/" + encodeURIComponent(id),
              {
                headers: { Authorization: "Bearer " + token },
              },
            );
            if (!res.ok) return;
            var entry = await res.json();

            historyList.style.display = "none";
            historyLoadMore.style.display = "none";
            historyDetail.style.display = "block";

            var html =
              '<button class="history-detail-back" id="history-back">\u2190 Back to list</button>';
            html +=
              '<div class="result-body">' +
              DOMPurify.sanitize(marked.parse(entry.summary || "")) +
              "</div>";

            // Metadata
            var metaParts = [];
            if (entry.sourceUrl)
              metaParts.push(
                '<a href="' +
                  escapeHtml(entry.sourceUrl) +
                  '" target="_blank" rel="noopener">' +
                  escapeHtml(truncateUrl(entry.sourceUrl, 50)) +
                  "</a>",
              );
            metaParts.push(escapeHtml(entry.model));
            metaParts.push(escapeHtml(entry.inputLength));
            metaParts.push(escapeHtml(formatDate(entry.createdAt)));
            if (entry.metadata) {
              try {
                var meta =
                  typeof entry.metadata === "string"
                    ? JSON.parse(entry.metadata)
                    : entry.metadata;
                if (meta.costUsd != null)
                  metaParts.push("Cost: $" + meta.costUsd.toFixed(4));
                if (
                  meta.inputTokens != null ||
                  meta.outputTokens != null
                ) {
                  metaParts.push(
                    "Tokens: " +
                      (
                        (meta.inputTokens || 0) + (meta.outputTokens || 0)
                      ).toLocaleString(),
                  );
                }
              } catch (e) {}
            }
            html +=
              '<div class="result-meta">' +
              metaParts
                .map(function (p) {
                  return "<span>" + p + "</span>";
                })
                .join("") +
              "</div>";

            // Media player placeholder
            if (entry.hasMedia && entry.mediaUrl) {
              html += '<div id="history-media-slot"></div>';
            }

            // Transcript
            if (entry.hasTranscript && entry.transcript) {
              html +=
                '<button class="history-transcript-toggle" id="transcript-toggle">Show transcript</button>';
              html +=
                '<div class="history-transcript-body" id="transcript-body">' +
                escapeHtml(entry.transcript) +
                "</div>";
            }

            // Delete
            html +=
              '<button class="history-delete-btn" id="history-delete-btn">Delete this entry</button>';

            historyDetail.innerHTML = html;

            // Insert media element via DOM API (avoids URL injection via innerHTML)
            var mediaSlot = document.getElementById("history-media-slot");
            if (mediaSlot && entry.hasMedia && entry.mediaUrl) {
              var mtype = entry.mediaType || "";
              var el = document.createElement(
                mtype.startsWith("video/") ? "video" : "audio",
              );
              el.className = "history-media";
              el.controls = true;
              el.src = entry.mediaUrl + "?token=" + encodeURIComponent(token);
              mediaSlot.replaceWith(el);
            }

            document
              .getElementById("history-back")
              .addEventListener("click", function () {
                historyDetail.style.display = "none";
                historyList.style.display = "block";
                if (historyOffset < historyTotal)
                  historyLoadMore.style.display = "block";
              });

            var toggleBtn = document.getElementById("transcript-toggle");
            if (toggleBtn) {
              toggleBtn.addEventListener("click", function () {
                var body = document.getElementById("transcript-body");
                var visible = body.style.display === "block";
                body.style.display = visible ? "none" : "block";
                toggleBtn.textContent = visible
                  ? "Show transcript"
                  : "Hide transcript";
              });
            }

            document
              .getElementById("history-delete-btn")
              .addEventListener("click", async function () {
                if (
                  !confirm(
                    "Delete this history entry? This cannot be undone.",
                  )
                )
                  return;
                try {
                  await fetch("/v1/history/" + encodeURIComponent(id), {
                    method: "DELETE",
                    headers: { Authorization: "Bearer " + token },
                  });
                  historyDetail.style.display = "none";
                  historyList.style.display = "block";
                  loadHistory(false);
                } catch (err) {
                  alert("Delete failed: " + err.message);
                }
              });
          } catch (err) {
            console.error("Failed to load history detail:", err);
          }
        }

        historyLoadMore.addEventListener("click", function () {
          loadHistory(true);
        });

        // Load history when History tab is clicked
        document.querySelectorAll(".tab").forEach(function (tab) {
          tab.addEventListener("click", function () {
            var target = this.getAttribute("data-tab");
            if (target === "history") {
              historyDetail.style.display = "none";
              historyList.style.display = "block";
              loadHistory(false);
            }
          });
        });
      })();
    </script>
  </body>
</html>
